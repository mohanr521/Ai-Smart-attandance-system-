<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Smart Attendance System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input,
select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:15px;
    margin-right:10px;
    color:white;
}

.start-btn{
    background:#2563eb;
}

.login-btn{
    background:green;
}

.logout-btn{
    background:red;
}

button:hover{
    opacity:0.8;
}

video{
    width:100%;
    border-radius:15px;
    margin-top:15px;
}

canvas{
    display:none;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th,
table td{
    border:1px solid #334155;
    padding:12px;
    text-align:center;
}

table th{
    background:#334155;
}

img{
    width:70px;
    height:70px;
    border-radius:10px;
    object-fit:cover;
}

.success{
    color:lightgreen;
    margin-top:10px;
}

.present{
    color:lightgreen;
    font-weight:bold;
}

.absent{
    color:red;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 AI Smart Attendance System</h1>

<div class="card">

<h2>Student Registration</h2>

<input
type="text"
id="name"
placeholder="Enter Student Name">

<input
type="text"
id="roll"
placeholder="Enter Roll Number">

<select id="department">

<option value="">
Select Department
</option>

<option value="BSC(CSA)">
BSC(CSA)
</option>

<option value="BSC(IT)">
BSC(IT)
</option>

<option value="BCA">
BCA
</option>

</select>

<button
class="start-btn"
onclick="registerStudent()">

Register Student

</button>

<p
class="success"
id="registerMsg"></p>

</div>

<div class="card">

<h2>Camera Attendance Capture</h2>

<video id="video" autoplay></video>

<br>

<button
class="start-btn"
onclick="startCamera()">

Start Camera

</button>

<button
class="login-btn"
onclick="loginAttendance()">

Login In

</button>

<button
class="logout-btn"
onclick="logoutAttendance()">

Login Out

</button>

<canvas id="canvas"></canvas>

<p
class="success"
id="attendanceMsg"></p>

</div>

<div class="card">

<h2>Attendance Records</h2>

<table>

<thead>

<tr>

<th>Photo</th>
<th>Name</th>
<th>Roll No</th>
<th>Department</th>
<th>Date</th>
<th>Login In</th>
<th>Login Out</th>
<th>Working Hours</th>
<th>Status</th>
<th>Attendance %</th>

</tr>

</thead>

<tbody id="attendanceTable">
</tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

(function(){

    emailjs.init("VT_QINtV57Fllgk9p");

})();

let students = [];

let currentStudent = null;

let loginTime = "";

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

function registerStudent(){

    const name =
    document.getElementById("name").value;

    const roll =
    document.getElementById("roll").value;

    const department =
    document.getElementById("department").value;

    if(
        name === "" ||
        roll === "" ||
        department === ""
    ){

        alert("Please fill all details");

        return;
    }

    currentStudent = {

        name:name,
        roll:roll,
        department:department

    };

    students.push(currentStudent);

    document.getElementById("registerMsg")
    .innerHTML =
    "✅ Student Registered Successfully";

    document.getElementById("name").value = "";

    document.getElementById("roll").value = "";

    document.getElementById("department").value = "";
}

async function startCamera(){

    try{

        const stream =
        await navigator.mediaDevices
        .getUserMedia({
            video:true
        });

        video.srcObject = stream;

    }catch(error){

        alert("Camera access denied");
    }
}

function loginAttendance(){

    if(currentStudent == null){

        alert("Register student first");

        return;
    }

    loginTime = new Date();

    document.getElementById("attendanceMsg")
    .innerHTML =
    "✅ Login In Recorded";
}

function logoutAttendance(){

    if(currentStudent == null){

        alert("Register student first");

        return;
    }

    if(loginTime === ""){

        alert("Please Login In first");

        return;
    }

    const context =
    canvas.getContext("2d");

    canvas.width =
    video.videoWidth;

    canvas.height =
    video.videoHeight;

    context.drawImage(video,0,0);

    const imageData =
    canvas.toDataURL("image/png");

    const logoutTime =
    new Date();

    const date =
    logoutTime.toLocaleDateString();

    const inTime =
    loginTime.toLocaleTimeString();

    const outTime =
    logoutTime.toLocaleTimeString();

    const diffMilliseconds =
    logoutTime - loginTime;

    const workedHours =
    diffMilliseconds /
    (1000 * 60 * 60);

    const workingHours =
    workedHours.toFixed(2)
    + " Hours";

    let attendancePercentage =
    (workedHours / 8) * 100;

    if(attendancePercentage > 100){

        attendancePercentage = 100;
    }

    attendancePercentage =
    attendancePercentage.toFixed(2);

    let status = "Absent";

    let statusClass = "absent";

    if(workedHours >= 6){

        status = "Present";

        statusClass = "present";
    }

    const table =
    document.getElementById("attendanceTable");

    const row =
    table.insertRow();

    row.innerHTML = `

        <td>
            <img src="${imageData}">
        </td>

        <td>${currentStudent.name}</td>

        <td>${currentStudent.roll}</td>

        <td>${currentStudent.department}</td>

        <td>${date}</td>

        <td>${inTime}</td>

        <td>${outTime}</td>

        <td>${workingHours}</td>

        <td class="${statusClass}">
            ${status}
        </td>

        <td>${attendancePercentage}%</td>

    `;

    emailjs.send(

        "mohanrmohan717@gmail.com",

        "template_x936qub",

        {

            student_name:
            currentStudent.name,

            roll_no:
            currentStudent.roll,

            department:
            currentStudent.department,

            attendance_date:
            date,

            login_in_time:
            inTime,

            logout_time:
            outTime,

            total_working_hours:
            workingHours,

            attendance_percentage:
            attendancePercentage + "%",

            attendance_status:
            status,

            to_email:
            "mohanrmohan717@gmail.com"

        }

    ).then(function(response){

        console.log(
            "✅ Email Sent Successfully"
        );

    }).catch(function(error){

        console.log(
            "❌ Email Sending Failed"
        );

    });

    document.getElementById("attendanceMsg")
    .innerHTML =
    "✅ Attendance Recorded Successfully";

    loginTime = "";
}

</script>

</body>
</html>
